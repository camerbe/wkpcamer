<section class="grid grid-cols-1 md:grid-cols-12 gap-4 mt-5">
  <!-- Colonne principale des articles -->
  <div class="col-span-1 md:col-span-8">
    @if (shouldShowContent()) {
      <app-index [indexArticles]="listIndex()" />
    } @else if (isLoading()) {
      <div class="loading-skeleton">
        <p>Chargement des articles...</p>
      </div>
    } @else {
      <div class="no-content">
        <p>Aucun article disponible</p>
      </div>
    }
  </div>

  <!-- Colonne latérale -->
  <div class="col-span-1 md:col-span-4">
    @defer (on idle) {
      <!-- Bloc Adsense -->


    <app-social-media />

     <p-divider/>
      <p-card>
        <ng-template pTemplate="content">
          <div class="p-2">

            <app-adsense
              [adClient]="adsenseConfig.adClient"
              [adSlot]="adsenseConfig.adSlot"
              [adFormat]="adsenseConfig.adFormat"
              [fullWidthResponsive]="adsenseConfig.fullWidthResponsive"
            />
          </div>
        </ng-template>
      </p-card>

      <p-divider />

      <!-- Débat Droit -->
      <app-debat-droit />

    } @placeholder {
      <!-- Placeholder pendant le chargement différé -->
      <div class="sidebar-placeholder">
        <p-card>
          <ng-template pTemplate="content">
            <div class="animate-pulse">
              <div class="h-64 bg-gray-200 rounded"></div>
            </div>
          </ng-template>
        </p-card>
      </div>
    } @loading (minimum 500ms) {
      <!-- État de chargement (optionnel) -->
      <div class="sidebar-loading">
        <p-card>
          <ng-template pTemplate="content">
            <div class="text-center p-4">
              <i class="pi pi-spin pi-spinner" style="font-size: 2rem"></i>
            </div>
          </ng-template>
        </p-card>
      </div>
    }
  </div>
</section>
