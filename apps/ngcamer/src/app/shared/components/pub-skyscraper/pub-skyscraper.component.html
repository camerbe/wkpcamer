@if(isCardFormat()){
  <p-card >
     <ng-template pTemplate="header">
      <div class="bg-green-500 p-2 rounded-t-lg">
        <h3 class="text-xl font-bold text-white m-0 uppercase"><i class="pi pi-check mr-2"></i>partenaire</h3>
      </div>
     </ng-template>
     <ng-template pTemplate="content">
         <div class="card-image-container relative aspect-w-3 aspect-h-2 sm:aspect-w-1 sm:aspect-h-1 lg:aspect-w-3 lg:aspect-h-4">
           @if (pub(); as pubData){
          <a [href]="pubData.href" target="_blank" rel="noopener noreferrer"  [attr.aria-label]="'Publicité ' + pubData.editor">
            <img
              [ngSrc]="imageUrl()"
              alt="Publicité {{pubData.editor}}"
              title="Publicité {{pubData.editor}}"
              fill

              class="object-contain"
            />
          </a>
          }@else if (isLoading()) {
          <!-- ✅ État de chargement -->
          <div class="skeleton-loader bg-gray-200 h-full w-full flex items-center justify-center">
            <span class="text-gray-500">Chargement...</span>
          </div>
        } @else if (error()) {
          <!-- ✅ État d'erreur -->
          <div class="error-state bg-red-50 h-full w-full flex flex-col items-center justify-center p-4 text-center">
            <i class="pi pi-exclamation-triangle text-red-500 text-3xl mb-2"></i>
            <p class="text-red-600 text-sm">{{ error() }}</p>
          </div>
        }
         </div>
      </ng-template>
  </p-card>
}

@if (isBannerFormat() ) {
  <div class="mx-auto relative h-24 aspect-auto">
    @if (pub(); as pubData) {
      <a
        [href]="pubData.href"
        target="_blank"
        rel="noopener noreferrer"
        [attr.aria-label]="'Publicité ' + pubData.editor">
        <img
          [ngSrc]="imageUrl()"
          [alt]="'Publicité ' + pubData.editor"
          [title]="'Publicité ' + pubData.editor"
          fill

          sizes="(max-width: 768px) 100vw"
          class="object-contain"

        />
      </a>
    }@else if (isLoading()) {
      <!-- ✅ Skeleton loader avec animation -->
      <div
        class="skeleton-loader bg-gray-200 h-24 w-full flex items-center justify-center animate-pulse"
        style="aspect-ratio: 728/90"
        aria-hidden="true">
        <span class="text-gray-400 text-sm">Chargement de la publicité...</span>
      </div>
    } @else if (error()) {
      <!-- ✅ État d'erreur compact pour banner -->
      <div
        class="error-state bg-red-50 h-24 w-full flex items-center justify-center gap-2 text-red-600"
        style="aspect-ratio: 728/90">
        <i class="pi pi-exclamation-triangle"></i>
        <span class="text-sm">Publicité indisponible</span>
      </div>
    }
  </div>
}
