
<p-card>
  <ng-template #header>
    <div class="bg-green-500 p-2 rounded-t-lg">
      <h3 class="text-xl font-semibold text-white m-0 uppercase">
        <i class="pi pi-check mr-2" aria-hidden="true"></i>Suivez-nous
      </h3>
    </div>
  </ng-template>
  <ng-template pTemplate="content">
    <div>

  <div class="flex space-x-3">
    <a
      href="#"
      aria-label="Suivez-nous sur Facebook"
      target="_blank"
      rel="noopener noreferrer"
      class="w-10 h-10 bg-blue-600 text-white rounded-full flex items-center justify-center hover:bg-blue-700 transition-colors">
      <i class="pi pi-facebook text-sm" aria-hidden="true"></i>
    </a>
    <a
      href="#"
      aria-label="Suivez-nous sur X"
      target="_blank"
      rel="noopener noreferrer"
      class="w-10 h-10 bg-blue-400 text-white rounded-full flex items-center justify-center hover:bg-blue-500 transition-colors">
      <i class="pi pi-twitter text-sm" aria-hidden="true"></i>
    </a>
    <a
      href="#"
      aria-label="Suivez-nous sur YouTube"
      target="_blank"
      rel="noopener noreferrer"
      class="w-10 h-10 bg-red-600 text-white rounded-full flex items-center justify-center hover:bg-red-700 transition-colors">
      <i class="pi pi-youtube text-sm" aria-hidden="true"></i>
    </a>
    <a
      href="#"
      aria-label="Suivez-nous sur Instagram"
      target="_blank"
      rel="noopener noreferrer"
      class="w-10 h-10 bg-pink-600 text-white rounded-full flex items-center justify-center hover:bg-pink-700 transition-colors">
      <i class="pi pi-instagram text-sm" aria-hidden="true"></i>
    </a>
  </div>
</div>
  </ng-template>
</p-card>
