<p-card>
  <p-dataview
    #dv
    [value]="articlesWithRoutes()"
    class="!rounded-md"
    [lazy]="true"
    [rows]="10"
    [paginator]="false"
  >
    @if(articlesWithRoutes().length > 0) {
      <!-- Header -->
      <ng-template #header>
        <h2 class="uppercase p-3 md:font-semibold text-teal-700 flex items-center">
          <picture class="mr-2">
            <img
              [src]="headerFlagUrl()"
              [alt]="headerCountryName()"
              width="20"
              height="15"
              loading="eager"
            />
          </picture>
          {{ headerTitle() }}<i class="pi pi-plus mx-2" aria-hidden="true"></i>lus
        </h2>
      </ng-template>

      <!-- List template -->
      <ng-template #list let-items>
        <div class="grid grid-cols-12 gap-4">
          @for(item of items; track item.slug; let first = $first) {
            <div class="col-span-12">
              <article
                class="flex items-center p-3 gap-4"
                [class.border-t]="!first"
              >
                <div class="w-16 h-16 relative flex-shrink-0">
                  <img
                    [ngSrc]="item.imageUrl"
                    [alt]="item.imageAlt"
                    width="64"
                    height="64"
                    class="object-cover rounded-full"
                    loading="lazy"
                  />
                  <p-overlaybadge
                    [value]="item.hitDisplay"
                    class="absolute top-1 left-3 z-10"
                    severity="warn"
                  />
                </div>

                <div class="flex-1 min-w-0">
                  <a
                    [routerLink]="item.routeUrl"
                    class="cursor-pointer group block"
                    [attr.aria-label]="item.ariaLabel"
                  >
                    <span class="text-md text-gray-500 leading-tight group-hover:text-orange-600 group-hover:underline transition-colors line-clamp-3">
                      {{ item.titre }}
                    </span>
                  </a>
                </div>
              </article>
            </div>
          }
        </div>
      </ng-template>
    }
  </p-dataview>
</p-card>
