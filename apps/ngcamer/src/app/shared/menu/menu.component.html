<div class="fixed-megamenu">
  <p-megamenu [model]="items">
    <ng-template pTemplate="start">
      <a
        [routerLink]="['/']"
        (click)="gotoHome()"
        tabindex="0"
        (keypress)="gotoHome()"
        class="inline-flex items-center no-underline bg-transparent border-0 cursor-pointer"
      >
        <img
          ngSrc="/assets/images/camer-logo.png"
          alt="Camer.be"
          class="mr-2"
          width="190"
          height="52"
          class="w-full h-auto max-w-full">
        <span class="sr-only">Accueil Camer.be</span>
      </a>
    </ng-template>


    <ng-template pTemplate="end">
       <form #searchForm="ngForm" (ngSubmit)="submitSearch()" >
        <p-inputgroup>
          <input
            pInputText
            placeholder="Rechercher..."
            name="q"
            [(ngModel)]="searchQuery"
          />
          <p-inputgroup-addon>
            <p-button icon="pi pi-search"
            (click)="submitSearch()"
            ariaLabel="Rechercher"
            [text]="true"
            severity="success"
            variant="text" />
          </p-inputgroup-addon>
        </p-inputgroup>
       </form>

    </ng-template>
  </p-megamenu>


</div>
